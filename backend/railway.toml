[build]
  builder = "nixpacks"

[deploy]
  startCommand = ". /app/.venv/bin/activate 2>/dev/null || true; python init_chroma.py && python -m uvicorn main:app --host 0.0.0.0 --port $PORT"
  restartPolicyType = "on_failure"
  restartPolicyMaxRetries = 3

[healthcheck]
  path = "/health"
  timeout = 300
